# GitHub organizations RAG indexer config.
# Resolved by `src/index/github_organizations/config.py` and merged with env
# vars (`RCP_TOKEN`, `GME_GITHUB_TOKEN`, `INDEX_QDRANT_URL`,
# `INDEX_QDRANT_API_KEY`, `INDEX_DATA_DIR`) at startup. No `scope.seeds`
# block — orgs are ingested organically via `/v2/extract` auto-ingest
# and `POST /v2/indices/github_organizations/ingest` calls.

rcp:
  base_url: https://inference-rcp.epfl.ch/v1
  embedding_model: Qwen/Qwen3-Embedding-8B
  embedding_dim: 4096
  query_instruction: "Given a query about a research lab, university, company, or open-source organization, retrieve relevant GitHub organization profiles"
  reranker_model: Qwen/Qwen3-Reranker-8B
  batch_size: 32
  max_concurrency: 4
  timeout_seconds: 120

github:
  api_base: https://api.github.com
  max_concurrency: 4
  # Org cards often have a richer description than user bios.
  min_card_chars: 16

qdrant:
  url: http://gme-qdrant:6333
  prefer_grpc: false

chunking:
  size_tokens: 512
  overlap_tokens: 0
  tokenizer: cl100k_base
