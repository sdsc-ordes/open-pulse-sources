# ETH Research Collection RAG indexer config.
# Resolved by `src/index/ethz_research_collection/config.py` and merged with env vars
# (`RCP_TOKEN`, `ETHZ_RESEARCH_COLLECTION_TOKEN`, `INDEX_DATA_DIR`) at startup.

rcp:
  # EPFL RCP OpenAI-compatible inference endpoint (shared with the other
  # RAG indices — same embedding/rerank models keep cross-index hits
  # comparable).
  base_url: https://inference-rcp.epfl.ch/v1
  embedding_model: Qwen/Qwen3-Embedding-8B
  # Native dim for Qwen3-Embedding-8B is 4096. Configurable down to 32.
  embedding_dim: 4096
  # Prepended to every query (not passages) per Qwen3-Embedding instruction format.
  query_instruction: "Given a web search query, retrieve relevant passages that answer the query"
  reranker_model: Qwen/Qwen3-Reranker-8B
  # Per-batch input count for /v1/embeddings. Smaller default given 8B params.
  batch_size: 16
  # Concurrent in-flight embed/rerank calls.
  max_concurrency: 4
  # Generous to accommodate RCP cold-start (model load can take minutes).
  timeout_seconds: 120

# Pydantic field name is `research_collection` (see EthzResearchCollectionIndexConfig).
research_collection:
  # ETH Research Collection runs DSpace 7. The REST API is mounted at /server/api.
  # Verify against https://www.research-collection.ethz.ch/server/api when first
  # running ingest — no auth needed for read-only endpoints.
  base_url: https://www.research-collection.ethz.ch/server/api
  page_size: 100
  # DSpace edge layers 405 under burst; keep concurrency modest.
  # `dspace.py` retries 405/429/5xx with exponential backoff.
  max_concurrency: 2

filter:
  # Solr `fulltext:` qualifier is applied per-term against
  # /discover/search/objects?configuration=researchoutputs. The same
  # terms drive the URL-extraction regex in extract_matches.py.
  terms:
    - github.com
    - huggingface.co
    - hf.co

chunking:
  size_tokens: 1024
  overlap_tokens: 128
  # tiktoken encoding name. cl100k_base is a reasonable proxy for the
  # Qwen3 tokenizer; counts are within ~10% for English/code text.
  tokenizer: cl100k_base

qdrant:
  # Devcontainer default. Overridden by INDEX_QDRANT_URL / INDEX_QDRANT_API_KEY
  # / INDEX_QDRANT_PREFER_GRPC env vars at load time.
  url: http://gme-qdrant:6333
  prefer_grpc: false
  api_key: null
