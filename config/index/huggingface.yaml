discovery:
  # Substrings fed to list_models(search=...) / list_datasets(search=...).
  # Hits grouped by namespace; new namespaces written to
  # logs/discover_orgs.jsonl for human review before promoting into
  # `scope.seeds`. Never auto-added.
  search_terms:
    # EPFL institutional + adjacent institute / lab tokens. Substring
    # matches are noisy by design — review the resulting jsonl before
    # promoting any namespace to `scope.seeds`.
    epfl:
      # Institutional + city.
      - epfl
      - lausanne
      # Affiliated / adjacent institutes.
      - idiap          # Idiap Research Institute (Martigny, EPFL-affiliated)
      - martigny
      - c4dt           # Center for Digital Trust
      - ai-center      # EPFL AI Center
      # Lab / group acronyms commonly used as namespace prefixes.
      - mlo            # Machine Learning and Optimization (Jaggi)
      - lasa           # Learning Algorithms and Systems (Billard)
      - vita           # Visual Intelligence for Transportation
      - cvlab          # Computer Vision Lab (Fua)
      - ivrl           # Image and Visual Representation Lab (Süsstrunk)
      - vilab          # Visual Intelligence and Learning (Zamir)
      - chili          # Computer-Human Interaction in Learning & Instruction
      - lions          # Laboratory for Information and Inference Systems (Cevher)
      - dlab           # Data Science Lab (West)
      - dhlab          # Digital Humanities Lab (Kaplan)
      - nlp            # NLP labs (paired with EPFL via namespace)
      - lts2           # Signal Processing Lab 2 (Vandergheynst)
      - lts4           # Signal Processing Lab 4 (Frossard)
      - lcav           # Audiovisual Communications Lab (Vetterli)
      - mlbio          # Machine Learning for Biology
      - sage           # Scalable Computing Systems Lab
    # Cast a wide net — discover-orgs only surfaces candidates for review,
    # never auto-adds. Mix of institutional acronyms, university initials,
    # and city names. False positives are expected (e.g. "bern" matches
    # "Bernarderfds"); the human-review step in logs/discover_orgs.jsonl
    # is where they get filtered out.
    switzerland:
      # Institutional acronyms.
      - epfl
      - eth
      - ethz
      - bsse        # D-BSSE Basel — ETH Zurich systems biology dept
      - cscs        # Swiss National Supercomputing Centre
      - empa        # Federal Laboratories for Materials Science
      - psi         # Paul Scherrer Institute
      - paul-scherrer
      - sdsc        # Swiss Data Science Center
      # Swiss university acronyms.
      - usi         # Università della Svizzera italiana
      - uzh         # Universität Zürich
      - unibe       # Universität Bern
      - unibas      # Universität Basel
      - unil        # Université de Lausanne
      - unige       # Université de Genève
      - unifr       # Universität Freiburg
      - unine       # Université de Neuchâtel
      - hesso       # HES-SO (Western Switzerland)
      - hslu        # Hochschule Luzern
      - fhnw        # Fachhochschule Nordwestschweiz
      # City + country tokens (noisy but catch the long tail).
      - lausanne
      - zurich
      - geneva
      - basel
      - bern
      - swiss
      # EPFL adjacent / lab tokens (mirrors `epfl` scope).
      - idiap
      - martigny
      - c4dt
      - ai-center
      - mlo
      - lasa
      - vita
      - cvlab
      - ivrl
      - vilab
      - chili
      - lions
      - dlab
      - dhlab
      - nlp
      - lts2
      - lts4
      - lcav
      - mlbio
      - sage
      # CERN-related tokens — CERN straddles the FR/CH border in Meyrin (GE).
      # HF presence is small but the LHC sub-experiments (ATLAS/CMS/LHCb/
      # ALICE) all have HF orgs / personal accounts worth surfacing.
      - cern
      - meyrin       # CERN's host commune in Geneva canton
      - atlas        # ATLAS experiment (very noisy — false positives expected)
      - cms-experiment
      - lhcb
      - alice-experiment
      - openlab      # CERN openlab — public/private partnership
      - hep          # high-energy physics (noisy, but catches CERN-adjacent)
      - particle-physics

qdrant:
  # Compose service `gme-qdrant` on the `dev` network. Use the service name
  # (not localhost) so this resolves correctly from inside the devcontainer.
  # See `.internal/ror/qdrant-setup.md` for the hostname rationale.
  url: http://gme-qdrant:6333
  prefer_grpc: false

chunking:
  # Cards are short — bigger chunks than openalex's 256.
  size_tokens: 512
  overlap_tokens: 64
  # tiktoken encoding name. cl100k_base is a reasonable proxy for the Qwen3
  # tokenizer; counts are within ~10% for English text.
  tokenizer: cl100k_base
