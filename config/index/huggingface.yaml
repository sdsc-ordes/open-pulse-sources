# HuggingFace RAG indexer config.
# Resolved by `src/index/huggingface/config.py` and merged with env vars
# (RCP_TOKEN, HF_TOKEN, INDEX_QDRANT_URL, INDEX_QDRANT_API_KEY,
# INDEX_QDRANT_PREFER_GRPC, INDEX_HUGGINGFACE_SCOPE, INDEX_DATA_DIR)
# at startup.

rcp:
  # OpenAI-compatible inference endpoint. Same RCP deployment as the
  # infoscience and openalex indexers.
  base_url: https://inference-rcp.epfl.ch/v1
  embedding_model: Qwen/Qwen3-Embedding-8B
  # Native dim for Qwen3-Embedding-8B is 4096. Configurable down to 32 if
  # RCP deploys with Matryoshka truncation.
  embedding_dim: 4096
  query_instruction: "Given a search query, retrieve relevant model and dataset cards"
  reranker_model: Qwen/Qwen3-Reranker-8B
  batch_size: 32
  max_concurrency: 4
  timeout_seconds: 120

huggingface:
  api_base: https://huggingface.co
  # Default page size for HfApi list endpoints. Hub max is 100 (anonymous)
  # and 100 (authenticated); leave at 100.
  per_page: 100
  max_concurrency: 4
  # When true, snapshot_download README + *.json + *.yaml + *.md alongside
  # the metadata pull. Weight files are always ignored.
  full_cards: false
  # Skip embedding rows whose card is shorter than this many characters —
  # avoids embedding "# My Demo" placeholder cards as standalone chunks.
  min_card_chars: 64

