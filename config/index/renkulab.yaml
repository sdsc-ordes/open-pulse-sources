# RenkuLab RAG indexer config.
# Resolved by `src/index/renkulab/config.py` and merged with env vars
# (`RCP_TOKEN`, `RENKULAB_TOKEN`, `INDEX_QDRANT_API_KEY`, `INDEX_DATA_DIR`,
# `INDEX_QDRANT_URL`) at startup.

rcp:
  # Same RCP deployment as openalex / zenodo / infoscience indexers.
  base_url: https://inference-rcp.epfl.ch/v1
  embedding_model: Qwen/Qwen3-Embedding-8B
  embedding_dim: 4096
  query_instruction: "Given a search query, retrieve relevant RenkuLab projects, groups, users, and data connectors"
  reranker_model: Qwen/Qwen3-Reranker-8B
  batch_size: 32
  max_concurrency: 4
  timeout_seconds: 120

renkulab:
  base_url: https://renkulab.io/api/data
  # Documented page-size cap is 100 across the public Renku data API.
  page_size: 100
  # Polite default. Renku's nginx fronts a Go service that handles bursts
  # well, but we throttle to keep batch jobs from looking abusive.
  rate_per_minute: 120
  max_concurrency: 4

scope:
  # `all` ingests every public project / group / user / data connector.
  # `epfl` / `switzerland` filter post-fetch via keyword/namespace match —
  # Renku has no first-class community concept, so the filter is heuristic.
  default: all
  # Substrings matched (case-insensitive) against namespace + keywords +
  # repository URLs. Anything matching is kept under the named scope.
  epfl_keywords:
    - epfl
    - lausanne
    - .epfl.ch
  switzerland_keywords:
    - epfl
    - eth
    - ethz
    - unibe
    - unil
    - unige
    - unifr
    - unine
    - sdsc
    - switch
    - .ch/
    - swiss

# Per-entity ingest toggles. Default to all on; flip off for a faster
# partial run.
entities:
  projects: true
  groups: true
  users: true
  data_connectors: true
  group_members: true
  project_members: true

qdrant:
  # Devcontainer compose service name — REST 6333, gRPC 6334.
  # Use http://localhost:6333 from a host shell instead.
  url: http://gme-qdrant:6333
  prefer_grpc: false

chunking:
  size_tokens: 256
  overlap_tokens: 64
  tokenizer: cl100k_base
